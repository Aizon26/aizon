<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZON | APEX-ZERO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=Fira+Code:wght@300;500&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --deep-space: #010409;
        }

        body {
            background-color: var(--deep-space);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .glass-terminal {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #hyper-canvas { position: fixed; inset: 0; z-index: -1; }

        /* Custom Scrollbar for Terminal Logs */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body x-data="apexCore()" x-init="initializeSystem()">

    <canvas id="hyper-canvas"></canvas>

    <!-- AUTH GATE -->
    <template x-if="!isAuthorized">
        <div class="sovereign-vault fixed inset-0 flex flex-col items-center justify-center p-10 bg-black z-[1000]">
            <div class="text-center mb-12">
                <h1 class="text-8xl font-black tracking-tighter uppercase mb-2">Apex<span class="text-cyan-400">Zero</span></h1>
                <p class="text-[10px] tracking-[1em] text-gray-500">SECURE SOVEREIGN ACCESS</p>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full max-w-md">
                <button @click="connectWallet('MetaMask')" class="glass-terminal p-6 rounded-2xl hover:border-cyan-400 transition flex flex-col items-center">
                    <i data-lucide="wallet" class="mb-2"></i>
                    <span class="text-[10px] font-bold">METAMASK</span>
                </button>
                <button @click="connectWallet('Google')" class="glass-terminal p-6 rounded-2xl hover:border-white transition flex flex-col items-center">
                    <i data-lucide="log-in" class="mb-2"></i>
                    <span class="text-[10px] font-bold">GOOGLE SSO</span>
                </button>
            </div>
        </div>
    </template>

    <!-- OS INTERFACE -->
    <div x-show="isAuthorized" x-cloak class="flex h-screen w-full">
        
        <!-- SIDEBAR -->
        <aside class="w-20 border-r border-white/5 flex flex-col items-center py-8 bg-black/20">
            <div class="w-12 h-12 bg-cyan-500 rounded-xl flex items-center justify-center text-black mb-12 shadow-lg shadow-cyan-500/20">
                <i data-lucide="zap"></i>
            </div>
            <nav class="flex flex-col gap-8 text-gray-500">
                <i data-lucide="layout-grid" class="cursor-pointer hover:text-cyan-400"></i>
                <i data-lucide="activity" class="cursor-pointer hover:text-cyan-400"></i>
                <i data-lucide="shield" class="cursor-pointer hover:text-cyan-400"></i>
            </nav>
        </aside>

        <!-- MAIN -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
                <div class="flex items-center gap-6">
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Node: Mumbai_26</span>
                    <div class="h-4 w-px bg-white/10"></div>
                    <span class="text-xs font-mono text-cyan-400" x-text="activeWallet"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Total Liquidity</p>
                        <p class="text-xl font-black">₹<span x-text="format(totalWorth)"></span></p>
                    </div>
                </div>
            </header>

            <main class="flex-1 p-8 grid grid-cols-12 gap-6 overflow-hidden">
                <!-- TAX CALCULATOR PANEL -->
                <div class="col-span-8 space-y-6 overflow-y-auto pr-2 custom-scroll">
                    <section class="glass-terminal rounded-[3rem] p-10 border-t border-cyan-400/20">
                        <h2 class="text-[10px] font-black text-cyan-400 tracking-widest uppercase mb-6">Real-Time Yield Ledger</h2>
                        <div class="grid grid-cols-2 gap-10">
                            <div>
                                <p class="text-5xl font-black italic">₹<span x-text="format(yieldMonthly)"></span></p>
                                <p class="text-[9px] text-gray-500 mt-2 uppercase tracking-widest">Gross Monthly Yield</p>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-white/5 rounded-2xl">
                                    <p class="text-[8px] text-red-400 font-bold uppercase">VDA Tax (30%)</p>
                                    <p class="font-bold">₹<span x-text="format(yieldMonthly * 0.3)"></span></p>
                                </div>
                                <div class="p-4 bg-green-400/10 rounded-2xl border border-green-400/20">
                                    <p class="text-[8px] text-green-400 font-bold uppercase">Net Profit</p>
                                    <p class="font-bold text-green-400">₹<span x-text="format(yieldMonthly * 0.688)"></span></p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- ASSETS -->
                    <div class="grid grid-cols-2 gap-4">
                        <template x-for="asset in assets" :key="asset.symbol">
                            <div class="glass-terminal p-6 rounded-3xl flex justify-between items-center">
                                <div>
                                    <p class="text-sm font-black" x-text="asset.name"></p>
                                    <p class="text-[9px] text-gray-500" x-text="asset.symbol"></p>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold">₹<span x-text="format(asset.price * asset.balance)"></span></p>
                                    <p class="text-[9px] text-cyan-400" x-text="asset.balance"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- TERMINAL -->
                <div class="col-span-4 flex flex-col gap-6">
                    <div class="glass-terminal flex-1 rounded-3xl p-6 flex flex-col font-mono text-[10px] overflow-hidden">
                        <div class="flex-1 overflow-y-auto space-y-2 mb-4 custom-scroll" id="log-container">
                            <template x-for="log in sysLogs" :key="log.id">
                                <div><span class="text-cyan-400">>></span> <span x-text="log.text"></span></div>
                            </template>
                        </div>
                        <input type="text" x-model="commandInput" @keyup.enter="execCommand" placeholder="COMMAND_INPUT..." class="bg-white/5 p-3 rounded-xl border-none outline-none focus:ring-1 ring-cyan-400/50">
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function apexCore() {
            return {
                isAuthorized: false,
                activeWallet: 'DISCONNECTED',
                commandInput: '',
                yieldMonthly: 124500.00,
                sysLogs: [],
                assets: [
                    { name: 'Orizon DeFAI', symbol: 'ORI', price: 5408, balance: 485, network: 'L1' },
                    { name: 'Tether', symbol: 'USDT', price: 87.4, balance: 12000, network: 'TRC20' }
                ],

                get totalWorth() {
                    return this.assets.reduce((sum, a) => sum + (a.price * a.balance), 0);
                },

                initializeSystem() {
                    this.addLog("System Kernal 4.0.26 Loaded.");
                    this.init3D();
                    lucide.createIcons();
                },

                async connectWallet(type) {
                    this.addLog(`Initiating handshake with ${type}...`);
                    // Artificial Delay for effect
                    setTimeout(() => {
                        this.isAuthorized = true;
                        this.activeWallet = type === 'Google' ? 'auth.sovereign.user' : '0x71C...890';
                        this.addLog("Auth Success. Welcome back, Admin.");
                        setTimeout(() => lucide.createIcons(), 100);
                    }, 1000);
                },

                execCommand() {
                    let cmd = this.commandInput.toLowerCase();
                    this.addLog(`EXEC: ${cmd}`);
                    
                    if(cmd === 'clear') this.sysLogs = [];
                    if(cmd === 'help') this.addLog("Available: CLEAR, STATUS, REBOOT, SYNC");
                    
                    this.commandInput = '';
                },

                addLog(text) {
                    this.sysLogs.push({ id: Date.now(), text });
                    this.$nextTick(() => {
                        const container = document.getElementById('log-container');
                        container.scrollTop = container.scrollHeight;
                    });
                },

                format(n) { return n.toLocaleString('en-IN'); },

                init3D() {
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('hyper-canvas'), alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    const geometry = new THREE.IcosahedronGeometry(15, 1);
                    const material = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.05 });
                    const sphere = new THREE.Mesh(geometry, material);
                    scene.add(sphere);
                    camera.position.z = 40;
                    const animate = () => {
                        requestAnimationFrame(animate);
                        sphere.rotation.y += 0.002;
                        renderer.render(scene, camera);
                    };
                    animate();
                }
            }
        }
    </script>
</body>
</html>
