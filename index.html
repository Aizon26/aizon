<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizon | Universal Web3 Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --neon-blue: #00d2ff; --dark-bg: #030305; --glass: rgba(255, 255, 255, 0.03); }
        body { background-color: var(--dark-bg); color: #e2e8f0; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .glow-btn { background: linear-gradient(45deg, #00d2ff, #9d50bb); transition: 0.3s; }
        .glow-btn:hover { box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); transform: translateY(-2px); }
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. LOGIN MODAL -->
    <div id="login-overlay">
        <div class="glass p-10 max-w-sm w-full text-center border-t-4 border-cyan-400">
            <div class="w-16 h-16 glow-btn rounded-2xl flex items-center justify-center text-white mx-auto mb-6">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <h2 class="font-cyber text-2xl mb-2">Secure Portal</h2>
            <p class="text-gray-400 mb-8 text-sm">Sign in to sync your crypto portfolio.</p>
            
            <div class="space-y-4">
                <!-- MetaMask -->
                <button onclick="connectMetaMask()" class="w-full flex items-center justify-between bg-[#f6851b]/10 border border-[#f6851b]/40 hover:bg-[#f6851b]/20 p-4 rounded-xl transition">
                    <span class="font-bold text-[#f6851b]">MetaMask</span>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg" class="w-6">
                </button>
                
                <!-- Google -->
                <button onclick="socialLogin('Google')" class="w-full flex items-center justify-between bg-white/5 border border-white/10 hover:bg-white/10 p-4 rounded-xl transition">
                    <span class="font-bold text-white">Google ID</span>
                    <i class="fab fa-google text-red-500 text-xl"></i>
                </button>

                <!-- Apple -->
                <button onclick="socialLogin('Apple')" class="w-full flex items-center justify-between bg-white/5 border border-white/10 hover:bg-white/10 p-4 rounded-xl transition">
                    <span class="font-bold text-white">Apple ID</span>
                    <i class="fab fa-apple text-white text-2xl"></i>
                </button>
            </div>
            
            <p class="mt-8 text-[10px] text-gray-500 uppercase tracking-widest">Powered by Aizon Web3 Engine</p>
        </div>
    </div>

    <!-- 2. DASHBOARD CONTENT -->
    <div id="dashboard-ui" class="hidden">
        <header class="h-20 border-b border-white/10 flex items-center justify-between px-8 glass sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-cyber font-bold text-cyan-400">AIZON</span>
            </div>
            <div id="market-ticker" class="hidden md:flex gap-6 text-xs font-bold text-cyan-400">
                <!-- Live Prices -->
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-xs font-bold">User Account</p>
                    <p id="user-addr" class="text-[10px] text-gray-500 font-mono">0x00...000</p>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <main class="p-8 max-w-6xl mx-auto space-y-8">
            <!-- Portfolio Overview -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-8 col-span-2">
                    <p class="text-gray-500 text-xs uppercase mb-1">Total Net Worth</p>
                    <h1 class="text-6xl font-bold tracking-tighter text-white">₹<span id="total-inr">0.00</span></h1>
                    <div class="mt-4 flex gap-4">
                        <div class="bg-cyan-500/10 px-3 py-1 rounded text-xs text-cyan-400 border border-cyan-500/20">
                            <i class="fab fa-ethereum mr-1"></i> <span id="eth-bal">0.00</span> ETH
                        </div>
                    </div>
                </div>
                <div class="glass p-8 flex flex-col justify-center text-center">
                    <p class="text-gray-500 text-xs uppercase mb-4">Security Level</p>
                    <div class="relative w-24 h-24 mx-auto mb-4">
                        <div class="absolute inset-0 border-4 border-cyan-500 rounded-full animate-pulse"></div>
                        <div class="flex items-center justify-center h-full text-2xl text-cyan-400">
                            <i class="fas fa-user-check"></i>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-green-400 uppercase">Verified Account</p>
                </div>
            </div>

            <!-- Market List -->
            <div class="glass p-8">
                <h3 class="font-cyber mb-6">Real-Time Market Prices (INR)</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-gray-500 border-b border-white/5 text-xs uppercase">
                            <tr><th class="pb-4">Asset</th><th class="pb-4 text-center">Price</th><th class="pb-4 text-right">24H Change</th></tr>
                        </thead>
                        <tbody id="price-rows" class="divide-y divide-white/5">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentEthPrice = 0;

        // --- 1. LOGIN LOGIC ---
        async function connectMetaMask() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const balance = await provider.getBalance(accounts[0]);
                    
                    loginSuccess({
                        name: "MetaMask User",
                        address: accounts[0],
                        eth: ethers.formatEther(balance)
                    });
                } catch (e) { alert("MetaMask connection failed."); }
            } else { alert("Please install MetaMask!"); }
        }

        function socialLogin(provider) {
            // Simulated Social Login for Demo
            // In production, integrate Firebase Auth (auth.signInWithPopup)
            loginSuccess({
                name: `${provider} Pilot`,
                address: `social_${provider.toLowerCase()}_verified`,
                eth: "0.452" // Simulated real balance for social login demo
            });
        }

        function loginSuccess(user) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('dashboard-ui').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-addr').innerText = user.address;
            document.getElementById('eth-bal').innerText = parseFloat(user.eth).toFixed(4);
            
            updatePrices();
            setInterval(updatePrices, 30000); // 30s Refresh
        }

        // --- 2. LIVE PRICE LOGIC (COINGECKO) ---
        async function updatePrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=inr&include_24hr_change=true');
                const data = await res.json();
                
                currentEthPrice = data.ethereum.inr;
                
                // Update Ticker
                document.getElementById('market-ticker').innerHTML = `
                    <span>BTC: ₹${data.bitcoin.inr.toLocaleString()}</span>
                    <span>ETH: ₹${data.ethereum.inr.toLocaleString()}</span>
                `;

                // Update Table
                const assets = [
                    { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin', data: data.bitcoin },
                    { id: 'ethereum', symbol: 'ETH', name: 'Ethereum', data: data.ethereum },
                    { id: 'binancecoin', symbol: 'BNB', name: 'Binance Coin', data: data.binancecoin }
                ];

                document.getElementById('price-rows').innerHTML = assets.map(a => `
                    <tr>
                        <td class="py-5 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-xs font-bold">${a.symbol}</div>
                            <span class="font-bold">${a.name}</span>
                        </td>
                        <td class="py-5 text-center font-mono">₹${a.data.inr.toLocaleString()}</td>
                        <td class="py-5 text-right font-bold ${a.data.inr_24h_change >= 0 ? 'text-green-400' : 'text-red-400'}">
                            ${a.data.inr_24h_change.toFixed(2)}%
                        </td>
                    </tr>
                `).join('');

                // Update Total Portfolio Worth
                const ethAmount = parseFloat(document.getElementById('eth-bal').innerText);
                document.getElementById('total-inr').innerText = (ethAmount * currentEthPrice).toLocaleString(undefined, {minimumFractionDigits: 2});

            } catch (e) { console.error("Market API limit reached."); }
        }
    </script>
</body>
</html>
