<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPilot India | Live Web3 Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Ethers.js to connect to MetaMask -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: #fff; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
    </style>
</head>
<body x-data="web3Handler()" x-init="initApp()">

    <!-- HEADER -->
    <header class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center neon-glow">
                <i data-lucide="compass" class="text-black"></i>
            </div>
            <h1 class="text-xl font-bold uppercase tracking-tighter">CryptoPilot <span class="text-cyan-400">India</span></h1>
        </div>

        <div class="flex items-center gap-4">
            <!-- Google/Gmail User Display -->
            <template x-if="userEmail">
                <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                    <div class="w-6 h-6 bg-gradient-to-r from-fuchsia-500 to-purple-600 rounded-full flex items-center justify-center text-[10px]" x-text="userEmail[0].toUpperCase()"></div>
                    <span class="text-xs font-medium text-gray-300" x-text="userEmail"></span>
                </div>
            </template>
            
            <!-- MetaMask Connect Button -->
            <button @click="connectWallet" 
                    class="bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-2 rounded-xl font-bold text-sm transition-all flex items-center gap-2">
                <i data-lucide="wallet" class="w-4 h-4"></i>
                <span x-text="walletAddress ? shortenAddress(walletAddress) : 'Connect MetaMask'"></span>
            </button>
        </div>
    </header>

    <main class="pt-28 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 pb-12">
        
        <!-- MAIN PORTFOLIO -->
        <div class="lg:col-span-8 space-y-8">
            <div class="p-10 rounded-[3rem] bg-gradient-to-br from-cyan-900/40 to-slate-900 border border-cyan-500/20 relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-cyan-400 text-xs font-bold uppercase tracking-widest mb-2">Real-Time Market Value</p>
                            <h2 class="text-6xl font-bold">₹ <span x-text="formatCurrency(btcPriceINR)"></span></h2>
                            <p class="text-gray-400 mt-2 flex items-center gap-2">
                                <i data-lucide="activity" class="w-4 h-4 text-green-400"></i>
                                Live from Global Exchanges
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LIVE MARKET DATA (Real Values) -->
            <div class="glass rounded-[2.5rem] p-8">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="text-cyan-400"></i> Active Asset Monitor
                </h3>
                <div class="space-y-4">
                    <template x-for="coin in marketData" :key="coin.id">
                        <div class="flex items-center justify-between p-5 hover:bg-white/5 rounded-2xl border border-transparent hover:border-white/10 transition-all">
                            <div class="flex items-center gap-4">
                                <img :src="coin.image" class="w-10 h-10 rounded-full shadow-lg">
                                <div>
                                    <h4 class="font-bold uppercase" x-text="coin.symbol"></h4>
                                    <p class="text-xs text-gray-500" x-text="coin.name"></p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-mono font-bold text-lg" x-text="'₹' + formatCurrency(coin.current_price)"></p>
                                <p :class="coin.price_change_percentage_24h > 0 ? 'text-green-400' : 'text-red-400'" 
                                   class="text-xs font-bold" x-text="coin.price_change_percentage_24h.toFixed(2) + '%'"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- SIDEBAR: AUTH & MLM -->
        <div class="lg:col-span-4 space-y-6">
            <!-- ACCOUNT STATUS -->
            <div class="glass rounded-[2rem] p-6 border-t-4 border-cyan-500">
                <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4">Pilot Profile</h3>
                <div class="space-y-4">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Network</span>
                        <span class="text-cyan-400 font-bold" x-text="networkName">Connecting...</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Login via</span>
                        <span class="text-white" x-text="userEmail ? 'Gmail' : 'Guest'"></span>
                    </div>
                </div>
            </div>

            <!-- REFERRAL ENGINE -->
            <div class="bg-gradient-to-br from-indigo-600 to-purple-800 rounded-[2rem] p-8 shadow-xl shadow-indigo-500/20">
                <i data-lucide="users" class="w-8 h-8 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">Referral SQUAD</h3>
                <p class="text-xs text-indigo-100 mb-6">Connect your wallet to generate your unique Indian Pilot referral link.</p>
                <div class="bg-black/20 p-4 rounded-xl border border-white/10 mb-4">
                    <p class="text-[10px] text-indigo-200 uppercase mb-1">Your Link</p>
                    <p class="text-xs font-mono truncate" x-text="walletAddress ? 'https://cryptopilot.in/ref/' + walletAddress : 'Connect Wallet to View'"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function web3Handler() {
            return {
                walletAddress: null,
                networkName: 'Not Connected',
                userEmail: 'user.india@gmail.com', // Placeholder for Gmail SSO
                btcPriceINR: 0,
                marketData: [],

                async initApp() {
                    // 1. Fetch Real Global Market Data from CoinGecko API
                    this.updateMarketData();
                    setInterval(() => this.updateMarketData(), 30000); // Update every 30s
                },

                async updateMarketData() {
                    try {
                        const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=inr&ids=bitcoin,ethereum,binancecoin,matic-network&order=market_cap_desc');
                        const data = await response.json();
                        this.marketData = data;
                        this.btcPriceINR = data.find(c => c.id === 'bitcoin').current_price;
                    } catch (e) {
                        console.error("Market data fetch failed");
                    }
                },

                async connectWallet() {
                    if (typeof window.ethereum !== 'undefined') {
                        try {
                            const provider = new ethers.providers.Web3Provider(window.ethereum);
                            const accounts = await provider.send("eth_requestAccounts", []);
                            const network = await provider.getNetwork();
                            
                            this.walletAddress = accounts[0];
                            this.networkName = network.name.toUpperCase();
                            
                            // Log real MetaMask data to console for developer verify
                            console.log("Connected Account:", this.walletAddress);
                        } catch (error) {
                            alert("Connection Failed: " + error.message);
                        }
                    } else {
                        alert("MetaMask not detected! Please install it.");
                    }
                },

                shortenAddress(addr) {
                    return `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}`;
                },

                formatCurrency(val) {
                    return val.toLocaleString('en-IN', {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });
                }
            }
        }
    </script>
</body>
</html>
